<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atividade Interativa</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf6ec;
      --primary: #f77f00;
      --secondary: #fcbf49;
      --accent: #d62828;
      --teal: #2ec4b6;
      --card: #fff;
      --text: #2d2d2d;
      --shadow: 0 8px 32px rgba(247,127,0,0.13);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Decorative background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, #fcbf49aa 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -100px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, #2ec4b644 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    header {
      width: 100%;
      padding: 36px 24px 20px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-family: 'Baloo 2', cursive;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 4px 18px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(214,40,40,0.18);
    }

    h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      color: var(--primary);
      line-height: 1.1;
      text-shadow: 3px 3px 0px var(--secondary);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: #7a6a5a;
      font-weight: 600;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* Stars decoration */
    .stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 18px 0 0;
      font-size: 1.4rem;
    }
    .stars span {
      animation: starPop 0.5s ease both;
    }
    .stars span:nth-child(1) { animation-delay: 0.1s; }
    .stars span:nth-child(2) { animation-delay: 0.22s; }
    .stars span:nth-child(3) { animation-delay: 0.34s; }
    .stars span:nth-child(4) { animation-delay: 0.46s; }
    .stars span:nth-child(5) { animation-delay: 0.58s; }
    @keyframes starPop {
      from { transform: scale(0) rotate(-30deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow), 0 2px 0 6px var(--secondary);
      padding: 28px 28px 24px;
      width: min(96vw, 600px);
      margin: 12px auto 0;
      animation: cardIn 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { transform: translateY(40px) scale(0.96); opacity: 0; }
      to   { transform: translateY(0) scale(1);       opacity: 1; }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .dot {
      width: 13px; height: 13px;
      border-radius: 50%;
    }
    .dot-r { background: #f87171; }
    .dot-y { background: #fbbf24; }
    .dot-g { background: #34d399; }
    .card-label {
      font-family: 'Baloo 2', cursive;
      font-size: 0.85rem;
      font-weight: 700;
      color: #b0a090;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-left: auto;
    }

    /* Responsive iframe wrapper */
    .iframe-wrapper {
      position: relative;
      width: 100%;
      /* 380/500 = 76% aspect ratio for the default 500x380 */
      padding-bottom: 76%;
      height: 0;
      overflow: hidden;
      border-radius: 16px;
      background: #f3ede4;
    }
    .iframe-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 16px;
    }

    /* Progress dots */
    .progress {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 22px;
    }
    .progress-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--secondary);
      transition: background 0.3s;
    }
    .progress-dot.active {
      background: var(--primary);
      transform: scale(1.3);
    }

    footer {
      position: relative;
      z-index: 1;
      margin: 32px auto 28px;
      text-align: center;
      font-size: 0.82rem;
      color: #b0a090;
      font-weight: 600;
    }
    footer strong {
      color: var(--teal);
    }

    /* Bounce animation for emoji */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    .bounce { display: inline-block; animation: bounce 1.6s infinite; }

    @media (max-width: 480px) {
      .card { padding: 18px 12px 16px; }
      h1 { text-shadow: 2px 2px 0px var(--secondary); }
    }
  </style>
</head>
<body>

  <header>
    <div class="badge">⚡ Atividade Interativa</div>
    <h1>Hora de Brincar! <span class="bounce">🎯</span></h1>
    <p class="subtitle">Complete a atividade abaixo com atenção. Você consegue!</p>
    <div class="stars">
      <span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
    </div>
  </header>

  <div class="card">
    <div class="card-header">
      <span class="dot dot-r"></span>
      <span class="dot dot-y"></span>
      <span class="dot dot-g"></span>
      <span class="card-label">Wordwall</span>
    </div>

    <div class="iframe-wrapper">
      <iframe
        src="https://wordwall.net/pt/embed/6aa7210141ce45c5ac9c47d58b10a056?themeId=21&templateId=69&fontStackId=0"
        allowfullscreen
        loading="lazy"
        title="Atividade Wordwall"
      ></iframe>
    </div>

    <div class="progress">
      <div class="progress-dot active"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
    </div>
  </div>

  <footer>
    Feito com <strong>❤️</strong> para tornar o aprendizado mais divertido!
  </footer>

</body>
</html>
